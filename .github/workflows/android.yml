name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java (Requirement for Android build)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Install Capacitor & Android Platform
      run: |
        npm install @capacitor/core @capacitor/android
        npm install -D @capacitor/cli
        
        # Initialize Capacitor configuration dynamically
        npx cap init StockFlow com.stockflow.app --web-dir dist
        
        # Add Android project
        npx cap add android
        npx cap sync android

    - name: Build APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: StockFlow-Android-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
